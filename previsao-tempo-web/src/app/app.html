<!-- Fundo de Imagem Dinâmico -->
<div class="image-background" [style.backgroundImage]="'url(' + imageUrl + ')'">
  <div class="image-overlay"></div> <!-- Película escura com gradiente -->
</div>

<!-- Container Principal (Centralização Absoluta) -->
<div class="main-wrapper">

  <!-- Widget Premium com Glassmorphism -->
  <div class="weather-widget text-center">

    <!-- Cabeçalho (Título e Subtítulo) -->
    <div class="header-section mb-4 fade-in text-center">
      <h1 class="app-title d-flex justify-content-center align-items-center"><i class="bi bi-cloud-sun-fill me-2 text-info"></i>Previsão do Tempo</h1>
      <p class="app-subtitle text-center">Saiba o clima da sua cidade em tempo real</p>
    </div>

    <!-- Nova Barra de Pesquisa Moderna -->
    <div class="search-box mb-4 fade-in w-100" style="animation-delay: 0.1s;">
      <div class="modern-search-wrapper">
        <input type="text"
               class="modern-input"
               placeholder="Qual cidade você procura?"
               [(ngModel)]="cidade"
               (keyup.enter)="buscarTempo()">
        <button class="modern-search-btn" type="button" (click)="buscarTempo()">
          Buscar
        </button>
      </div>
    </div>

    <!-- Mensagem de Erro Estilizada -->
    <div *ngIf="erro" class="alert alert-danger rounded-4 shadow-sm fade-in d-flex align-items-center justify-content-center gap-2 border-0 bg-danger text-white mt-3 mx-auto" style="max-width: 80%;">
      <i class="bi bi-exclamation-octagon-fill fs-5"></i> <span class="fw-medium text-center">{{ erro }}</span>
    </div>

    <!-- Resultado do Clima Reestruturado -->
    <div *ngIf="clima && !erro" class="weather-result fade-in mt-4 d-flex flex-column align-items-center w-100" style="animation-delay: 0.2s;">

      <h2 class="city-name fw-bold text-center w-100 mb-3">{{ clima.cidade }}</h2>

      <div class="temperature text-center mb-3">{{ clima.temperatura }}°</div>

      <!-- Caixa de Condição e Sensação Térmica -->
      <div class="condition-box w-100 mb-4 p-3">
          <div class="fs-4 text-capitalize fw-bold text-info">{{ clima.descricao }}</div>
          <hr class="my-2">
          <div class="text-white-50 fs-6">Sensação térmica: {{ clima.temperatura + 2 }}°C</div>
      </div>

      <!-- Cards Inferiores (Umidade e Vento) em linha -->
      <div class="row g-3 w-100">
        <!-- Card Vento -->
        <div class="col-6">
          <div class="info-card h-100 d-flex flex-column justify-content-center align-items-center p-3">
            <i class="bi bi-wind text-info mb-2 fs-2"></i>
            <span class="info-label text-uppercase text-white-50 small fw-bold mb-1">Vento</span>
            <span class="info-value fs-4 fw-bold text-white">{{ clima.vento }} km/h</span>
          </div>
        </div>

        <!-- Card Umidade -->
        <div class="col-6">
          <div class="info-card h-100 d-flex flex-column justify-content-center align-items-center p-3">
            <i class="bi bi-droplet-half text-primary mb-2 fs-2"></i>
            <span class="info-label text-uppercase text-white-50 small fw-bold mb-1">Umidade</span>
            <span class="info-value fs-4 fw-bold text-white">{{ clima.umidade }}%</span>
          </div>
        </div>
      </div>

    </div>

  </div>

</div>
